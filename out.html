<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Opening link</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<script>
  (() => {
    const destinations = {
      "github-repo": "https://github.com/SergeiNikolenko/Burette",
      "github-readme": "https://github.com/SergeiNikolenko/Burette#readme",
      "github-issues": "https://github.com/SergeiNikolenko/Burette/issues",
      "github-releases": "https://github.com/SergeiNikolenko/Burette/releases",
      "molstar": "https://molstar.org",
      "xyzrender": "https://github.com/aligfellow/xyzrender",
      "rdkit": "https://www.rdkit.org",
      "ketcher": "https://github.com/epam/ketcher",
    };

    const params = new URLSearchParams(window.location.search);
    const pathTarget = window.location.pathname.split("/").filter(Boolean).pop();
    const target = params.get("target") || pathTarget || "";
    const destination = destinations[target] || destinations["github-repo"];
    const manual = () => document.getElementById("manual-link");

    window.addEventListener("load", () => {
      const link = manual();
      if (link) link.href = destination;
      if (typeof window.va === "function") {
        window.va("event", "Outbound Redirect", {
          target,
          surface: params.get("surface") || "unknown",
        });
      }
      setTimeout(() => {
        window.location.replace(destination);
      }, 700);
    });
  })();
</script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 24px;
    background: #ffffff;
    color: #0a0a0a;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    width: min(100%, 420px);
    text-align: center;
  }
  h1 {
    margin: 0;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 1.05;
    letter-spacing: -0.03em;
  }
  p {
    margin: 16px 0 0;
    color: #52524e;
    font-size: 16px;
    line-height: 1.5;
  }
  a {
    display: inline-flex;
    margin-top: 24px;
    color: #0f8f72;
    font-weight: 600;
    text-decoration: none;
  }
</style>
</head>
<body>
<main>
  <h1>Opening link</h1>
  <p>You are being redirected.</p>
  <a id="manual-link" href="https://github.com/SergeiNikolenko/Burette" rel="noopener">Open manually</a>
</main>
</body>
</html>
