<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Burrete Online Demo</title>
  <meta name="description" content="Preview a molecular structure locally in your browser with Burrete.">
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: light; --accent: #0f8f72; --bg: #f7f8f7; --surface: #fff; --text: #111; --muted: #696b67; --border: #dedfdb; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body { font-family: Geist, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    header { height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 0 28px; background: rgba(255,255,255,.9); border-bottom: 1px solid var(--border); }
    header a { color: inherit; text-decoration: none; font-weight: 700; font-size: 19px; }
    header span { color: var(--muted); font-size: 13px; }
    main { width: min(1240px, calc(100% - 32px)); margin: 28px auto; }
    .intro { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 18px; }
    h1 { margin: 0 0 7px; font-size: clamp(28px, 4vw, 44px); letter-spacing: -.035em; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button { appearance: none; border: 1px solid var(--border); border-radius: 9px; background: var(--surface); color: var(--text); padding: 11px 16px; font: inherit; font-weight: 600; cursor: pointer; }
    button.primary { background: #111; color: white; border-color: #111; }
    .stage { position: relative; height: min(72vh, 760px); min-height: 480px; background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 24px 70px -44px rgba(0,0,0,.55); }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    .drop { position: absolute; inset: 12px; z-index: 3; display: none; place-items: center; border: 2px dashed var(--accent); border-radius: 10px; background: rgba(247,255,252,.93); color: var(--accent); font-size: 20px; font-weight: 700; pointer-events: none; }
    .stage.dragging .drop { display: grid; }
    .status { min-height: 22px; margin-top: 11px; color: var(--muted); font-size: 13px; }
    input { display: none; }
    @media (max-width: 760px) { header span { display: none; } .intro { align-items: start; flex-direction: column; } .stage { min-height: 520px; height: calc(100vh - 250px); } }
  </style>
</head>
<body>
  <header><a href="/">Burrete</a><span>Files stay in this browser and are not uploaded.</span></header>
  <main>
    <section class="intro">
      <div><h1>Online molecular preview</h1><p>Drop a PDB, CIF, mmCIF, SDF, MOL, MOL2, XYZ, or GRO file.</p></div>
      <div class="actions"><button id="sample">Load sample</button><button class="primary" id="open">Open file</button><input id="file" type="file" accept=".pdb,.ent,.pdbqt,.pqr,.cif,.mmcif,.mcif,.sdf,.sd,.mol,.mol2,.xyz,.gro"></div>
    </section>
    <section class="stage" id="stage"><div class="drop">Drop molecular file</div><iframe id="viewer" title="Burrete molecular preview"></iframe></section>
    <div class="status" id="status" role="status">Loading the sample structure…</div>
  </main>
  <script>
    const ASSET_ROOT = "https://burrete-plugin.vercel.app/burrete-viewer/";
    const MAX_BYTES = 3 * 1024 * 1024;
    const formatByExtension = { pdb: "pdb", ent: "pdb", pdbqt: "pdbqt", pqr: "pqr", cif: "mmcif", mmcif: "mmcif", mcif: "mmcif", sdf: "sdf", sd: "sdf", mol: "mol", mol2: "mol2", xyz: "xyz", gro: "gro" };
    const viewer = document.getElementById("viewer");
    const stage = document.getElementById("stage");
    const status = document.getElementById("status");
    const picker = document.getElementById("file");

    function bytesToBase64(bytes) {
      let binary = "";
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
      return btoa(binary);
    }

    function viewerDocument(name, format, base64, byteCount) {
      const config = { label: name, format, binary: false, renderer: "molstar", tauriViewer: false, byteCount, previewByteCount: byteCount, showPanelControls: true, theme: "light", canvasBackground: "white", overlayOpacity: .93, defaultLayoutState: { left: "hidden", right: "hidden", top: "hidden", bottom: "hidden" } };
      return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="${ASSET_ROOT}molstar.css"><link rel="stylesheet" href="${ASSET_ROOT}viewer-runtime.css"><style>html,body,#app{width:100%;height:100%;margin:0;overflow:hidden}#status{font-family:system-ui,sans-serif}</style></head><body><div id="app"></div><script src="${ASSET_ROOT}viewer-shell.js"><\/script><div id="status">Loading Burrete viewer…</div><script>window.BurreteCacheBuster="web-demo-v1";window.BurreteMolstarURL="${ASSET_ROOT}molstar.js";window.BurreteMolstarCSSURL="${ASSET_ROOT}molstar.css";window.BurreteConfig=${JSON.stringify(config)};window.BurreteDataBase64=${JSON.stringify(base64)};<\/script><script src="${ASSET_ROOT}burette-agent.js"><\/script><script src="${ASSET_ROOT}viewer.js"><\/script></body></html>`;
    }

    async function openFile(file) {
      if (!file) return;
      if (file.size > MAX_BYTES) { status.textContent = "File is larger than the 3 MiB demo limit."; return; }
      const extension = file.name.split(".").pop().toLowerCase();
      const format = formatByExtension[extension];
      if (!format) { status.textContent = `Unsupported file type: .${extension || "unknown"}`; return; }
      status.textContent = `Opening ${file.name}…`;
      const bytes = new Uint8Array(await file.arrayBuffer());
      viewer.srcdoc = viewerDocument(file.name, format, bytesToBase64(bytes), bytes.byteLength);
      status.textContent = `${file.name} · ${(file.size / 1024).toFixed(1)} KiB · processed locally`;
      window.va?.("event", "Demo File Opened", { format, source: "local-file" });
    }

    async function loadSample() {
      status.textContent = "Loading the sample structure…";
      const response = await fetch("/assets/demo-mini.pdb");
      const bytes = new Uint8Array(await response.arrayBuffer());
      viewer.srcdoc = viewerDocument("demo-mini.pdb", "pdb", bytesToBase64(bytes), bytes.byteLength);
      status.textContent = "demo-mini.pdb · sample file";
    }

    document.getElementById("open").addEventListener("click", () => picker.click());
    document.getElementById("sample").addEventListener("click", loadSample);
    picker.addEventListener("change", () => openFile(picker.files[0]));
    for (const eventName of ["dragenter", "dragover"]) stage.addEventListener(eventName, event => { event.preventDefault(); stage.classList.add("dragging"); });
    for (const eventName of ["dragleave", "drop"]) stage.addEventListener(eventName, event => { event.preventDefault(); stage.classList.remove("dragging"); });
    stage.addEventListener("drop", event => openFile(event.dataTransfer.files[0]));
    loadSample().catch(error => { status.textContent = `Could not load the sample: ${error.message}`; });
  </script>
</body>
</html>
