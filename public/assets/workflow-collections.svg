<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Molecule collection append and merge workflow</title>
  <desc id="desc">SDF, SMILES, CSV, or TSV inputs are validated as one format family, merged into a reviewable grid, and saved explicitly.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#0f8f72"/></marker>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#f8fbfa"/><stop offset="1" stop-color="#edf7f3"/></linearGradient>
    <style>.h{font:700 28px system-ui,sans-serif;fill:#101513}.t{font:650 18px system-ui,sans-serif;fill:#17201d}.s{font:400 14px system-ui,sans-serif;fill:#5f6b67}.card{fill:#fff;stroke:#cadbd5;stroke-width:2}.active{fill:#e2f4ee;stroke:#0f8f72;stroke-width:2}.a{fill:none;stroke:#0f8f72;stroke-width:3;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="62" class="h">Append or merge, then review before writing a file</text>
  <g transform="translate(55 118)">
    <rect class="card" width="220" height="72" rx="15"/><text x="24" y="31" class="t">SDF / SD</text><text x="24" y="53" class="s">record separators normalized</text>
    <rect class="card" y="88" width="220" height="72" rx="15"/><text x="24" y="119" class="t">SMI / SMILES</text><text x="24" y="141" class="s">non-empty records joined</text>
    <rect class="card" y="176" width="220" height="72" rx="15"/><text x="24" y="207" class="t">CSV or TSV</text><text x="24" y="229" class="s">matching headers required</text>
  </g>
  <path class="a" d="M295 242H395"/>
  <g transform="translate(395 154)">
    <rect class="active" width="250" height="176" rx="22"/>
    <text x="125" y="48" text-anchor="middle" class="t">Family validation</text>
    <text x="125" y="80" text-anchor="middle" class="s">one family per merge</text>
    <text x="125" y="106" text-anchor="middle" class="s">append records or merge files</text>
    <text x="125" y="142" text-anchor="middle" class="s">mixed families stop here</text>
  </g>
  <path class="a" d="M645 242H750"/>
  <g transform="translate(750 118)">
    <rect class="card" width="255" height="248" rx="22"/>
    <text x="28" y="43" class="t">Reviewable grid</text>
    <rect x="28" y="67" width="199" height="35" rx="7" fill="#edf3f1"/><text x="42" y="90" class="s">Search · SMARTS · sort</text>
    <rect x="28" y="115" width="58" height="54" rx="9" fill="#dff2ec"/><rect x="98" y="115" width="58" height="54" rx="9" fill="#e9eeec"/><rect x="169" y="115" width="58" height="54" rx="9" fill="#dff2ec"/>
    <path d="M40 146l15-18 15 18m40 0l15-18 15 18m41 0l15-18 15 18" fill="none" stroke="#0f8f72" stroke-width="3"/>
    <text x="28" y="202" class="s">select · edit · undo · export</text>
    <text x="28" y="226" class="s">suggested merged filename</text>
  </g>
  <path class="a" d="M1005 242H1075"/>
  <g transform="translate(1070 196)"><rect class="active" width="94" height="92" rx="18"/><text x="47" y="40" text-anchor="middle" class="t">Save</text><text x="47" y="63" text-anchor="middle" class="s">explicit</text></g>
  <text x="55" y="462" class="s">“Open separately” remains available when you do not want to modify the active grid.</text>
</svg>
